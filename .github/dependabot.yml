# This file was generated by the "Generate Dependabot Glob" action. Do not edit it directly.
# Make changes to `.github/dependabot.template.yml` and a PR will be automatically created.
version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
  - package-ecosystem: docker
    directory: api
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
    ignore:
      - dependency-name: node
        versions:
          - '>=25'
  - package-ecosystem: docker
    directory: web
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
    ignore:
      - dependency-name: node
        versions:
          - '>=25'
  - package-ecosystem: docker-compose
    directory: .
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
    ignore:
      - dependency-name: node
        versions:
          - '>=25'
  - package-ecosystem: npm
    directory: api
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
    ignore:
      - dependency-name: '@types/node'
        versions:
          - '>=25'
  - package-ecosystem: npm
    directory: .
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
    ignore:
      - dependency-name: '@types/node'
        versions:
          - '>=25'
  - package-ecosystem: npm
    directory: web
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
    ignore:
      - dependency-name: '@types/node'
        versions:
          - '>=25'
